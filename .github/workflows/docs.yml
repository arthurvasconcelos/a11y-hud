name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "packages/*/src/**"
      - "packages/*/package.json"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm docs:build

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs/.vitepress/dist
          branch: gh-pages
          clean: true
          # When archiving an old major version before shipping a new one,
          # add its folder to this list so it is not wiped on deploy:
          # clean-exclude: |
          #   v1/
          #   v2/
