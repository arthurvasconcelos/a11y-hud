name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["22", "24"]

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint + format check
        run: pnpm check:ci

      - name: Build core
        run: pnpm --filter=a11y-hud build

      - name: Type-check
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm -r --filter='./packages/*' exec vitest run --coverage --reporter=default --reporter=junit --outputFile.junit=test-report.junit.xml

      - name: Upload coverage to Codecov
        if: matrix.node-version == '24'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && matrix.node-version == '24' }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/core/test-report.junit.xml,packages/angular/test-report.junit.xml,packages/react/test-report.junit.xml,packages/vue/test-report.junit.xml,packages/svelte/test-report.junit.xml,packages/solid/test-report.junit.xml

      - name: Build packages
        run: pnpm build

      - name: Install Playwright browsers
        run: |
          pnpm --filter='./packages/core' exec playwright install --with-deps chromium firefox webkit
          pnpm --filter='./packages/react' exec playwright install chromium firefox webkit
          pnpm --filter='./packages/vue' exec playwright install chromium firefox webkit
          pnpm --filter='./packages/angular' exec playwright install chromium firefox webkit
          pnpm --filter='./packages/svelte' exec playwright install chromium firefox webkit
          pnpm --filter='./packages/solid' exec playwright install chromium firefox webkit

      - name: E2E tests
        run: pnpm test:e2e
